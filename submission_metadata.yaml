ai_usage_summary: |
  Used Gemini and Claude for codebase architecture discussion, implementing python algorithms, 
  and designing the Next.js frontend styling. No candidate data was sent to any external API 
  during ranking.

methodology_summary: |
  We implemented a robust two-stage retrieve-and-rerank candidate discovery engine:
  1. Fast Retrieval: We run a Python term-matching index that filters the 100,000 candidate database down to the top 1,000 matches in under 1 second.
  2. Honeypot Filtering: Logic checks detect and blacklist 70 impossible profiles (mismatched experience duration, expert skills with 0 months used).
  3. Semantic Reranking: We run a local SentenceTransformer (all-MiniLM-L6-v2) on CPU ONLY to compute semantic match scores for the top 1,000 matches.
  4. Heuristics: Multipliers adjust rankings based on sweet-spot experience (5-9 years), location/relocation, notice period, and active platform activity, applying a heavy penalty for consulting-only history. The pipeline runs in ~80 seconds.

